<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanBoards — Register</title>
  <meta name="description" content="Create a KanBoards account." />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Get started with KanBoards</p>

      <div id="registerError" class="alert alert-error" role="alert"></div>

      <form id="registerForm" class="auth-form" novalidate>

        <div class="form-group">
          <label for="email_id">Email <span style="color:#cc0000">*</span></label>
          <input type="email" id="email_id" name="email_id" placeholder="you@example.com" required maxlength="254"
            autocomplete="email" aria-describedby="email-hint" />
          <span id="email-hint" class="field-hint">Used to log in and receive reset codes</span>
        </div>

        <div class="form-group">
          <label for="password">Password <span style="color:#cc0000">*</span></label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Choose a password" required minlength="6"
              autocomplete="new-password" aria-describedby="password-hint" />
            <button type="button" class="toggle-password" aria-label="Show / hide password">
              <span class="eye-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </button>
          </div>
          <span id="password-hint" class="field-hint">6–72 characters</span>
        </div>

        <button type="submit" id="registerSubmit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login">Log in</a>
      </p>
    </div>
  </div>

  <script src="/static/utils.js"></script>
  <script src="/static/auth.js"></script>
</body>

</html>
