<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Boards — Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card red-line">
            <h2 class="auth-title">Register for Kanban Boards</h2>
            <div id="registerError" class="error-msg" style="display: none;"></div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Choose a password" required
                        autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="/login">Login</a>
            </p>
        </div>
    </div>

    <script src="/static/auth.js"></script>
</body>

</html>
