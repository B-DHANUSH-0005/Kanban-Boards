<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanBoards — My Boards</title>
  <meta name="description" content="Manage your Kanban boards." />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="logo">
      <h1>KanBoards</h1>
    </div>
    <div class="topbar-actions">
      <span id="userDisplay" class="user-display"></span>
      <button class="btn btn-primary btn-sm" id="openCreateBoard">+ New Board</button>
      <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <div class="page-header">
      <div>
        <h1 class="page-title">My Boards</h1>
        <p class="page-subtitle">Click a board to open it</p>
      </div>
      <input type="search" id="boardSearch" class="search-input" placeholder="Search boards…" autocomplete="off"
        aria-label="Search boards" />
    </div>

    <div class="boards-grid" id="boardsGrid">
      <!-- Injected by script.js -->
    </div>

    <div id="boardsPagination"></div>

  </main>

  <!-- Create / Edit Board Modal -->
  <div class="modal-backdrop" id="createBoardModal" role="dialog" aria-modal="true" aria-labelledby="boardModalTitle">
    <div class="modal">
      <h2 class="modal-title" id="boardModalTitle">New Board</h2>
      <div class="form-group">
        <label for="boardName">Board Name <span style="color:#cc0000">*</span></label>
        <input type="text" id="boardName" placeholder="e.g. Sprint 3" maxlength="80" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="boardDesc">Description
          <span
            style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text-muted)">(optional)</span>
        </label>
        <textarea id="boardDesc" rows="2" placeholder="What is this board for?" maxlength="500"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelCreateBoard">Cancel</button>
        <button class="btn btn-primary" id="submitCreateBoard">Create Board</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Confirm dialog -->
  <div class="dialog-backdrop" id="customConfirmModal">
    <div class="dialog-box">
      <h3 class="dialog-title" id="confirmTitle">Confirm</h3>
      <p class="dialog-msg" id="confirmMsg"></p>
      <div class="dialog-actions">
        <button class="btn btn-ghost" id="confirmCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="confirmOkBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="tick-wrapper">
      <svg class="tick-svg" viewBox="0 0 52 52">
        <circle class="tick-circle" cx="26" cy="26" r="25" fill="none" />
        <path class="tick-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
      </svg>
    </div>
    <p class="success-msg" id="successMsg">Done</p>
  </div>

  <script src="/static/utils.js"></script>
  <script src="/static/script.js"></script>
</body>

</html>
